<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BK Quote"/>
<meta name="theme-color" content="#0d0b08"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>BK Collective — Quote Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:#0d0b08;overscroll-behavior:none;}
  body{padding-bottom:env(safe-area-inset-bottom,0px);}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
  input[type=number]{-moz-appearance:textfield;}
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:rgba(255,255,255,0.02);}
  ::-webkit-scrollbar-thumb{background:rgba(212,175,55,0.25);border-radius:2px;}
  select option{background:#1a1508;color:#f5ead0;}

  /* ── Responsive grid overrides ── */
  @media(max-width:600px){
    .grid-2{grid-template-columns:1fr!important;}
    .grid-3{grid-template-columns:1fr 1fr!important;}
    .grid-4{grid-template-columns:1fr 1fr!important;}
    .grid-price{grid-template-columns:1fr!important;}
    .header-row{flex-direction:column!important;gap:10px!important;align-items:flex-start!important;}
    .header-quotnum{align-self:stretch!important;}
    .stone-row{grid-template-columns:1fr 1fr!important;row-gap:10px!important;}
    .stone-row .stone-add{grid-column:span 2;}
    .summary-3{grid-template-columns:1fr!important;}
    .action-btns{flex-direction:column!important;}
    .action-btns button{flex:unset!important;}
    .tabs{overflow-x:auto;white-space:nowrap;}
    .internal-grid{grid-template-columns:1fr 1fr 1fr!important;}
  }
  @media(max-width:420px){
    .grid-3{grid-template-columns:1fr!important;}
    .grid-4{grid-template-columns:1fr 1fr!important;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useMemo, useEffect } = React;

/* ─── Constants ──────────────────────────────────────────────────── */
const ALLOYS = [
  { key:"22k_y",    label:"22k Yellow Gold",  purity:0.9167, color:"#f5c842", isSilver:false, isPlatinum:false },
  { key:"18k_y",    label:"18k Yellow Gold",  purity:0.75,   color:"#e8b84b", isSilver:false, isPlatinum:false },
  { key:"18k_w",    label:"18k White Gold",   purity:0.75,   color:"#d0d0d0", isSilver:false, isPlatinum:false },
  { key:"18k_r",    label:"18k Rose Gold",    purity:0.75,   color:"#e8926b", isSilver:false, isPlatinum:false },
  { key:"14k_y",    label:"14k Yellow Gold",  purity:0.585,  color:"#d4a832", isSilver:false, isPlatinum:false },
  { key:"14k_w",    label:"14k White Gold",   purity:0.585,  color:"#b8b8b8", isSilver:false, isPlatinum:false },
  { key:"14k_r",    label:"14k Rose Gold",    purity:0.585,  color:"#d4896a", isSilver:false, isPlatinum:false },
  { key:"sterling", label:"Sterling Silver",  purity:0.925,  color:"#c0c0c0", isSilver:true,  isPlatinum:false },
  { key:"pt950",    label:"Platinum 950",     purity:0.95,   color:"#e8e8f0", isSilver:false, isPlatinum:true  },
];

const STONE_SHAPES = ["Round Brilliant","Princess","Oval","Cushion","Emerald","Pear","Marquise","Radiant","Asscher","Heart"];
const JOB_TYPES    = ["Custom Engagement Ring","Wedding Band","Pendant","Earrings (pair)","Bracelet","Brooch","Production Piece","Repair / Rework","Ring Sizing","Other"];
const SIZING_METALS = ["Silver","10KY","14KY","18KY","10KW","14KW","18KW"];
const SIZING_TABLE  = {
  "Down 1–2 Sizes": [80,  100, 110, 130, 120, 130, 150],
  "Down 3+ Sizes":  [null,null,null,null,null,null,null],
  "Up 1 Size":      [90,  130, 150, 170, 150, 170, 190],
  "Up 2 Sizes":     [110, 150, 170, 190, 170, 190, 210],
  "Up 3+ Sizes":    [null,null,null,null,null,null,null],
};
const SIZING_UP  = ["Up 1 Size","Up 2 Sizes","Up 3+ Sizes"];
const SIZING_EST = ["Down 3+ Sizes","Up 3+ Sizes"];

const BIZ = {
  name:      "BK Collective Ltd.",
  address:   "340 David Rd, Bowen Island, BC, V0N 1G1",
  email:     "bkcollectivedesigns@gmail.com",
  phone:     "(604) 813-1735",
  etransfer: "bkcollectivedesigns@gmail.com",
};

const GST_RATE = 0.05;
const PST_RATE = 0.07;

/* ─── Utilities ──────────────────────────────────────────────────── */
const fmtCAD = (n) => `$${Number(n||0).toLocaleString("en-CA",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fmtG   = (n) => `$${Number(n||0).toFixed(2)}/g`;
const uid    = () => Math.random().toString(36).slice(2);
const today  = () => new Date().toLocaleDateString("en-CA",{year:"numeric",month:"long",day:"numeric"});

const getNextInvoiceNum = () => {
  const count = parseInt(localStorage.getItem('bk_inv_count') || '0') + 1;
  localStorage.setItem('bk_inv_count', String(count));
  const num = `INV${String(count).padStart(3,'0')}`;
  localStorage.setItem('bk_current_inv', num);
  return num;
};
const initInvoiceNum = () => {
  const existing = localStorage.getItem('bk_current_inv');
  if (existing) return existing;
  return getNextInvoiceNum();
};

/* ─── Shared widget styles ───────────────────────────────────────── */
const inp = {
  background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,220,100,0.14)",
  borderRadius:7, color:"#f5ead0", padding:"9px 12px", fontSize:13,
  outline:"none", fontFamily:"inherit", width:"100%",
};
const sel  = {...inp, cursor:"pointer"};
const pill = (active, col="#d4af37") => ({
  background: active ? `rgba(${col==="#d4af37"?"212,175,55":col==="#34d399"?"52,211,153":"96,165,250"},0.16)` : "rgba(255,255,255,0.04)",
  border:`1px solid ${active?col:"rgba(255,255,255,0.09)"}`,
  color: active?col:"#4a3e28",
  borderRadius:7, padding:"7px 14px", cursor:"pointer", fontSize:12,
  fontWeight: active?600:400, transition:"all 0.15s",
});

function Lbl({children, hint}) {
  return (
    <div style={{marginBottom:5}}>
      <div style={{fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase",color:"#6b6047"}}>{children}</div>
      {hint&&<div style={{fontSize:10,color:"#3a3020",marginTop:2}}>{hint}</div>}
    </div>
  );
}
function Sec({title,children}) {
  return (
    <section>
      <div style={{fontSize:11,letterSpacing:"0.14em",textTransform:"uppercase",color:"#4a3e28",fontWeight:500,marginBottom:14,paddingBottom:8,borderBottom:"1px solid rgba(212,175,55,0.08)"}}>
        {title}
      </div>
      {children}
    </section>
  );
}

/* ─── Redesigned Invoice HTML ────────────────────────────────────── */
function buildInvoiceHTML(data) {
  const {
    clientName, jobType, quoteDate, quoteNum,
    lineItems, materialsSubtotal, labourSubtotal, subtotal,
    gst, pst, totalWithTax,
    depositPct, depositAmount, balanceDue,
    notes, wideRingSurcharge,
  } = data;

  const hasDeposit = depositPct > 0;

  const itemRows = lineItems.map(item => `
    <tr>
      <td class="item-name">${item.label}</td>
      <td class="item-desc">${item.description || '—'}</td>
      <td class="item-amt">${fmtCAD(item.amount)}</td>
    </tr>`).join('');

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>${quoteNum} — ${clientName || 'Client'} — ${BIZ.name}</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html{font-size:14px;}
  body{font-family:'Jost',sans-serif;color:#1c1810;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;}

  .page{max-width:760px;margin:0 auto;}

  /* ── Header ── */
  .header{background:#1c1810;padding:38px 52px 32px;display:flex;justify-content:space-between;align-items:flex-start;gap:24px;}
  .biz-block{}
  .biz-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:#f5ead0;letter-spacing:0.03em;line-height:1.1;margin-bottom:6px;}
  .biz-tagline{font-size:9.5px;letter-spacing:0.22em;text-transform:uppercase;color:#c8a84b;margin-bottom:14px;}
  .biz-contact{font-size:11.5px;color:#8a7a60;line-height:2.0;}
  .biz-contact a{color:#8a7a60;text-decoration:none;}
  .doc-block{text-align:right;flex-shrink:0;}
  .doc-type{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:700;color:#c8a84b;letter-spacing:0.08em;line-height:1;margin-bottom:10px;}
  .doc-meta{font-size:11.5px;color:#6a5a40;line-height:2.1;text-align:right;}
  .doc-meta .num{color:#c8a84b;font-weight:500;}

  /* ── Gold rule ── */
  .gold-rule{height:2px;background:linear-gradient(90deg,#1c1810 0%,#c8a84b 30%,#e8c96a 50%,#c8a84b 70%,#1c1810 100%);}

  /* ── Body ── */
  .body{padding:40px 52px;}

  /* ── Bill To + Meta ── */
  .meta-row{display:flex;justify-content:space-between;gap:32px;margin-bottom:36px;}
  .meta-block{}
  .meta-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#c8a84b;margin-bottom:6px;font-weight:500;}
  .meta-value{font-family:'Cormorant Garamond',serif;font-size:18px;color:#1c1810;line-height:1.3;}
  .meta-sub{font-size:12px;color:#6a5a40;margin-top:3px;}

  /* ── Table ── */
  .items-table{width:100%;border-collapse:collapse;margin-bottom:0;}
  .items-table thead tr{background:#1c1810;}
  .items-table thead th{padding:10px 16px;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#c8a84b;font-weight:500;text-align:left;}
  .items-table thead th.right{text-align:right;}
  .items-table tbody tr{border-bottom:1px solid #f0e8d8;}
  .items-table tbody tr:last-of-type{border-bottom:none;}
  .items-table tbody td{padding:13px 16px;font-size:13px;color:#2a2218;vertical-align:top;}
  .items-table tbody tr:nth-child(even) td{background:#faf7f2;}
  .item-name{font-weight:500;width:26%;}
  .item-desc{color:#6a5a40;font-size:12.5px;}
  .item-amt{text-align:right;white-space:nowrap;width:16%;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;}

  /* ── Subtotals ── */
  .subtotals{background:#f5f0e6;border-top:2px solid #e8d5a8;}
  .subtotals td{padding:9px 16px;font-size:12.5px;color:#6a5a40;}
  .subtotals td.right{text-align:right;font-family:'Cormorant Garamond',serif;font-size:14px;}
  .subtotals .sep td{border-top:1px dashed #e0cfa8;padding-top:10px;}
  .subtotals .strong td{color:#2a2218;font-weight:500;}

  /* ── Total row ── */
  .total-row td{background:#1c1810;color:#f5ead0;padding:14px 16px;font-size:14.5px;font-weight:600;letter-spacing:0.03em;}
  .total-row td.right{text-align:right;font-family:'Cormorant Garamond',serif;font-size:20px;color:#c8a84b;letter-spacing:0.02em;}

  /* ── Deposit box ── */
  .deposit-box{margin-top:24px;border:1.5px solid #e0d0a0;border-radius:6px;overflow:hidden;}
  .deposit-box-header{background:#f5f0e6;padding:10px 18px;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:#c8a84b;font-weight:500;}
  .deposit-inner{padding:0;}
  .deposit-row{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:1px solid #f0e8d8;}
  .deposit-row:last-child{border-bottom:none;}
  .deposit-label{font-size:13px;color:#4a3a20;}
  .deposit-sub{font-size:11px;color:#9a8060;margin-top:2px;}
  .deposit-amount{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:#1c1810;}
  .deposit-balance .deposit-amount{color:#c8a84b;}

  /* ── Surcharge notice ── */
  .surcharge{margin-top:14px;padding:10px 16px;background:#fff8f0;border-left:3px solid #e8843a;font-size:12px;color:#9a5020;border-radius:0 4px 4px 0;}

  /* ── Notes ── */
  .notes-box{margin-top:28px;border:1px solid #e8d5a8;border-radius:6px;padding:18px 20px;background:#fdf9f2;}
  .notes-label{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#c8a84b;margin-bottom:8px;font-weight:500;}
  .notes-text{font-size:13px;color:#4a3a20;line-height:1.7;}

  /* ── Payment ── */
  .payment-section{margin-top:32px;display:flex;justify-content:space-between;align-items:flex-start;gap:32px;padding-top:24px;border-top:1px solid #e8d5a8;}
  .payment-label{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#c8a84b;margin-bottom:8px;font-weight:500;}
  .payment-detail{font-size:13px;color:#4a3a20;line-height:2.0;}
  .payment-detail a{color:#1c1810;text-decoration:none;border-bottom:1px solid #e8d5a8;}
  .validity{font-size:11px;color:#9a8060;text-align:right;padding-top:4px;}

  /* ── Footer ── */
  .footer{margin-top:44px;padding-top:14px;border-top:1px solid #ede0c8;text-align:center;font-size:9.5px;color:#b0a080;letter-spacing:0.1em;text-transform:uppercase;}

  /* ── Print button (screen only) ── */
  .print-bar{display:flex;justify-content:center;gap:12px;padding:20px;background:#1c1810;border-bottom:1px solid rgba(200,168,75,0.2);}
  .print-btn{background:rgba(200,168,75,0.15);border:1px solid rgba(200,168,75,0.5);color:#c8a84b;padding:10px 28px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.06em;cursor:pointer;border-radius:5px;}
  .print-btn:hover{background:rgba(200,168,75,0.25);}
  .close-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:#8a7a60;padding:10px 20px;font-family:'Jost',sans-serif;font-size:13px;cursor:pointer;border-radius:5px;}

  @media print{
    .print-bar{display:none!important;}
    body{padding:0;}
    .page{max-width:none;}
    .header{padding:28px 40px 24px;}
    .body{padding:28px 40px;}
    @page{margin:0;size:A4;}
  }
</style>
</head>
<body>
<div class="print-bar">
  <button class="print-btn" onclick="window.print()">⬆ Print / Save as PDF</button>
  <button class="close-btn" onclick="window.close()">Close</button>
</div>
<div class="page">

  <div class="header">
    <div class="biz-block">
      <div class="biz-tagline">Jewellery Design &amp; Goldsmithing</div>
      <div class="biz-name">${BIZ.name}</div>
      <div class="biz-contact">
        ${BIZ.address}<br/>
        <a href="mailto:${BIZ.email}">${BIZ.email}</a><br/>
        ${BIZ.phone}
      </div>
    </div>
    <div class="doc-block">
      <div class="doc-type">QUOTE</div>
      <div class="doc-meta">
        <div><span class="num">${quoteNum}</span></div>
        <div>Date: ${quoteDate}</div>
        <div>Valid for 30 days</div>
      </div>
    </div>
  </div>
  <div class="gold-rule"></div>

  <div class="body">

    <div class="meta-row">
      <div class="meta-block">
        <div class="meta-label">Prepared For</div>
        <div class="meta-value">${clientName || '—'}</div>
      </div>
      <div class="meta-block" style="text-align:right">
        <div class="meta-label">Job Type</div>
        <div class="meta-value" style="font-size:16px">${jobType}</div>
      </div>
    </div>

    <table class="items-table">
      <thead>
        <tr>
          <th style="width:26%">Item</th>
          <th>Description</th>
          <th class="right" style="width:16%">Amount</th>
        </tr>
      </thead>
      <tbody>
        ${itemRows}
      </tbody>
      <tbody class="subtotals">
        <tr>
          <td></td><td>Materials Subtotal</td><td class="right">${fmtCAD(materialsSubtotal)}</td>
        </tr>
        <tr>
          <td></td><td>Labour Subtotal</td><td class="right">${fmtCAD(labourSubtotal)}</td>
        </tr>
        <tr class="sep strong">
          <td></td><td>Subtotal</td><td class="right">${fmtCAD(subtotal)}</td>
        </tr>
        <tr>
          <td></td><td style="color:#9a8060;">GST (5%)</td><td class="right" style="color:#9a8060;">${fmtCAD(gst)}</td>
        </tr>
        <tr>
          <td></td><td style="color:#9a8060;">PST (7% — materials only, labour exempt)</td><td class="right" style="color:#9a8060;">${fmtCAD(pst)}</td>
        </tr>
      </tbody>
      <tbody>
        <tr class="total-row">
          <td>Total (incl. tax)</td>
          <td></td>
          <td class="right">${fmtCAD(totalWithTax)}</td>
        </tr>
      </tbody>
    </table>

    ${hasDeposit ? `
    <div class="deposit-box">
      <div class="deposit-box-header">Payment Schedule</div>
      <div class="deposit-inner">
        <div class="deposit-row">
          <div>
            <div class="deposit-label">Deposit Required (${depositPct}%)</div>
            <div class="deposit-sub">Due to confirm order</div>
          </div>
          <div class="deposit-amount">${fmtCAD(depositAmount)}</div>
        </div>
        <div class="deposit-row deposit-balance">
          <div>
            <div class="deposit-label">Balance Due</div>
            <div class="deposit-sub">Due on completion / pickup</div>
          </div>
          <div class="deposit-amount">${fmtCAD(balanceDue)}</div>
        </div>
      </div>
    </div>` : ''}

    ${wideRingSurcharge ? `<div class="surcharge">⚠ Note: Ring is wider than 3mm — an additional wide-ring surcharge will apply. Amount to be confirmed at time of service.</div>` : ''}

    ${notes ? `
    <div class="notes-box">
      <div class="notes-label">Notes</div>
      <div class="notes-text">${notes}</div>
    </div>` : ''}

    <div class="payment-section">
      <div>
        <div class="payment-label">Payment Accepted Via</div>
        <div class="payment-detail">
          E-Transfer: <a href="mailto:${BIZ.etransfer}">${BIZ.etransfer}</a><br/>
          Payable to: ${BIZ.name}
        </div>
      </div>
      <div class="validity">
        Quote valid for 30 days from issue date.<br/>
        Prices subject to change after expiry.
      </div>
    </div>

    <div class="footer">
      ${BIZ.name}&nbsp;&nbsp;·&nbsp;&nbsp;${BIZ.address}&nbsp;&nbsp;·&nbsp;&nbsp;${BIZ.phone}
    </div>

  </div>
</div>
</body>
</html>`;
}

/* ─── Ring Sizing Panel ──────────────────────────────────────────── */
function RingSizingPanel({ onApplyToQuote }) {
  const [sizeMetal, setSizeMetal] = useState("14KY");
  const [sizeDir,   setSizeDir  ] = useState("Up 1 Size");
  const [wideRing,  setWideRing ] = useState(false);

  const metalIdx = SIZING_METALS.indexOf(sizeMetal);
  const flatRate = SIZING_TABLE[sizeDir]?.[metalIdx];
  const isEst    = SIZING_EST.includes(sizeDir) || flatRate===null;
  const isUp     = SIZING_UP.includes(sizeDir);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{background:"rgba(212,175,55,0.05)",border:"1px solid rgba(212,175,55,0.14)",borderRadius:12,padding:22}}>
        <div style={{fontSize:11,letterSpacing:"0.14em",textTransform:"uppercase",color:"#6b6047",marginBottom:14}}>Ring Sizing — Flat Rate Lookup</div>
        <div style={{fontSize:12,color:"#4a3e28",marginBottom:16,lineHeight:1.6}}>
          Rates for rings <strong style={{color:"#a07c30"}}>≤3mm width</strong>.
          Rings &gt;3mm are subject to a surcharge (TBD).
          <strong style={{color:"#d4af37"}}> +</strong> sizing rows = flat fee only; add cost of gold on top.
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}} className="grid-2">
          <div><Lbl>Metal</Lbl>
            <select style={sel} value={sizeMetal} onChange={e=>setSizeMetal(e.target.value)}>
              {SIZING_METALS.map(m=><option key={m}>{m}</option>)}
            </select>
          </div>
          <div><Lbl>Size Change</Lbl>
            <select style={sel} value={sizeDir} onChange={e=>setSizeDir(e.target.value)}>
              {Object.keys(SIZING_TABLE).map(k=><option key={k}>{k}</option>)}
            </select>
          </div>
        </div>

        <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:18}}>
          <div onClick={()=>setWideRing(p=>!p)} style={{width:36,height:20,borderRadius:10,background:wideRing?"rgba(251,146,60,0.4)":"rgba(255,255,255,0.08)",border:`1px solid ${wideRing?"#fb923c":"rgba(255,255,255,0.12)"}`,position:"relative",transition:"all 0.2s",flexShrink:0}}>
            <div style={{position:"absolute",top:2,left:wideRing?17:2,width:14,height:14,borderRadius:"50%",background:wideRing?"#fb923c":"#4a3e28",transition:"left 0.2s"}}/>
          </div>
          <span style={{fontSize:12,color:wideRing?"#fb923c":"#4a3e28"}}>Ring is wider than 3mm — surcharge applies (TBD)</span>
        </label>

        <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
          <div style={{background:isEst?"rgba(251,146,60,0.08)":"rgba(212,175,55,0.1)",border:`1px solid ${isEst?"rgba(251,146,60,0.3)":"rgba(212,175,55,0.3)"}`,borderRadius:10,padding:"12px 20px",minWidth:170}}>
            <div style={{fontSize:10,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4}}>{sizeMetal} — {sizeDir}</div>
            {isEst
              ? <div style={{fontSize:18,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:"#fb923c"}}>Estimate Required</div>
              : <div style={{display:"flex",alignItems:"baseline",gap:6}}>

                </div>
            }
            {wideRing&&<div style={{fontSize:11,color:"#fb923c",marginTop:4}}>⚠ + wide ring surcharge (TBD)</div>}
          </div>
          {!isEst&&(
            <button
              onClick={()=>onApplyToQuote({
                flatRate, wideRing, isUp,
                flatRateNote:`${sizeMetal} ring sizing — ${sizeDir}${isUp?" (+ gold cost)":""}`,
              })}
              style={{background:"rgba(212,175,55,0.12)",border:"1px solid rgba(212,175,55,0.35)",color:"#d4af37",borderRadius:8,padding:"10px 18px",cursor:"pointer",fontSize:13,fontWeight:600}}
            >
              Apply to Quote →
            </button>
          )}
        </div>
      </div>

      {/* Rate table */}
      <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:18,overflowX:"auto"}}>
        <div style={{fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",color:"#4a3e28",marginBottom:12}}>Full Rate Table</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:380}}>
          <thead>
            <tr>
              <th style={{textAlign:"left",padding:"6px 10px",color:"#6b6047",fontWeight:500,fontSize:10,letterSpacing:"0.08em"}}>Service</th>
              {SIZING_METALS.map(m=><th key={m} style={{textAlign:"center",padding:"6px 8px",color:"#6b6047",fontWeight:500,fontSize:10}}>{m}</th>)}
            </tr>
          </thead>
          <tbody>
            {Object.entries(SIZING_TABLE).map(([row, vals])=>{
              const isEstRow = SIZING_EST.includes(row);
              const isUpRow  = SIZING_UP.includes(row);
              return (
                <tr key={row} style={{borderTop:"1px solid rgba(255,255,255,0.04)"}}>
                  <td style={{padding:"8px 10px",color:"#c8b88a",fontWeight:isEstRow?400:500}}>{row}</td>
                  {vals.map((v,i)=>{
                    const active = SIZING_METALS[i]===sizeMetal && row===sizeDir;
                    return (
                      <td key={i} style={{textAlign:"center",padding:"8px 8px",color:active?"#d4af37":isEstRow||v===null?"#3a3020":"#8a7a60",fontWeight:active?700:400,background:active?"rgba(212,175,55,0.08)":"transparent"}}>
                        {isEstRow?"est.":v===null?"est.":`$${v}`}{isUpRow&&!isEstRow&&v!==null?<span style={{color:"#a07c30",fontSize:10}}>+</span>:""}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
        <div style={{fontSize:10,color:"#3a3020",marginTop:8}}>All rates for rings ≤3mm. "+" = base fee only; gold cost added separately. Rings &gt;3mm subject to surcharge (TBD).</div>
      </div>
    </div>
  );
}

/* ─── Alloy Table ────────────────────────────────────────────────── */
function AlloyTable({ alloys, alloyCostPerGram, silverMarkup }) {
  const [wAlloy,setWAlloy] = useState("18k_y");
  const [wGrams,setWGrams] = useState("");
  const alloy = alloys.find(a=>a.key===wAlloy);
  const cpg   = alloyCostPerGram(alloy);
  const markup= alloy.isSilver?silverMarkup:2;
  const cost  = cpg&&wGrams ? cpg*parseFloat(wGrams) : null;
  const sell  = cost!==null ? cost*markup : null;
  const i2={...inp,width:"auto"};
  return (
    <div>
      <p style={{margin:"0 0 18px",fontSize:13,color:"#6b6047",lineHeight:1.65}}>
        Cost = VBCE fine gold price × alloy purity. Gold & Platinum = <strong style={{color:"#d4af37"}}>2×</strong> markup. Silver = your selected markup.
      </p>
      <div style={{display:"flex",flexDirection:"column",gap:9}}>
        {alloys.map(a=>{
          const c=alloyCostPerGram(a);
          if(!c) return <div key={a.key} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:10,padding:"13px 18px",color:"#3a3020",fontSize:13}}>{a.label} — enter gold price above</div>;
          const mu=a.isSilver?silverMarkup:2;
          const sv=c*mu; const mg=sv-c;
          return (
            <div key={a.key} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,220,100,0.07)",borderRadius:12,padding:"13px 18px",borderLeft:`3px solid ${a.color}`,display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",alignItems:"center",gap:10}} className="internal-grid">
              <div><div style={{fontWeight:600,fontSize:14,marginBottom:2}}>{a.label}</div><div style={{fontSize:11,color:"#4a3e28"}}>{(a.purity*100).toFixed(1)}% pure</div></div>
              {[{l:"Cost/g",v:fmtG(c),col:"#f5ead0"},{l:"Markup",v:`${mu}×`,col:"#a07c30"},{l:"Sell/g",v:fmtG(sv),col:"#d4af37"},{l:"Margin/g",v:`+$${mg.toFixed(2)}`,col:"#34d399"}].map(({l,v,col})=>(
                <div key={l}><div style={{fontSize:9,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>{l}</div><div style={{fontSize:15,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:col}}>{v}</div></div>
              ))}
            </div>
          );
        })}
      </div>
      <div style={{marginTop:24,background:"rgba(212,175,55,0.05)",border:"1px solid rgba(212,175,55,0.14)",borderRadius:14,padding:20}}>
        <div style={{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"#6b6047",marginBottom:14}}>Quick Weight Calculator</div>
        <div style={{display:"flex",gap:14,alignItems:"flex-end",flexWrap:"wrap"}}>
          <div>
            <div style={{fontSize:10,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5}}>Alloy</div>
            <select style={{...i2,minWidth:150}} value={wAlloy} onChange={e=>setWAlloy(e.target.value)}>{alloys.map(a=><option key={a.key} value={a.key}>{a.label}</option>)}</select>
          </div>
          <div>
            <div style={{fontSize:10,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5}}>Weight (g)</div>
            <input style={{...i2,width:90}} type="number" min="0" step="0.1" placeholder="0.0" value={wGrams} onChange={e=>setWGrams(e.target.value)}/>
          </div>
          {cost!==null&&<>
            <div style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"9px 14px"}}><div style={{fontSize:9,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Your Cost</div><div style={{fontSize:18,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:"#f5ead0"}}>${cost.toFixed(2)}</div></div>
            <div style={{background:"rgba(212,175,55,0.1)",border:"1px solid rgba(212,175,55,0.25)",borderRadius:8,padding:"9px 14px"}}><div style={{fontSize:9,color:"#a07c30",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Sell ({markup}×)</div><div style={{fontSize:18,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:"#d4af37"}}>${sell.toFixed(2)}</div></div>
            <div style={{background:"rgba(52,211,153,0.07)",border:"1px solid rgba(52,211,153,0.18)",borderRadius:8,padding:"9px 14px"}}><div style={{fontSize:9,color:"#34d399",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Margin</div><div style={{fontSize:18,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:"#34d399"}}>+${(sell-cost).toFixed(2)}</div></div>
          </>}
        </div>
      </div>
    </div>
  );
}

/* ─── Main App ───────────────────────────────────────────────────── */
export default function JobQuotingCalculator() {

  const [goldInput,    setGoldInput   ] = useState("");
  const [silverInput,  setSilverInput ] = useState("");
  const [savedGold,    setSavedGold   ] = useState(()=>{ const v=localStorage.getItem('bk_gold'); return v?parseFloat(v):null; });
  const [savedSilver,  setSavedSilver ] = useState(()=>{ const v=localStorage.getItem('bk_silver'); return v?parseFloat(v):null; });
  const [silverMarkup, setSilverMarkup] = useState(2);

  const goldPerGram   = useMemo(()=>parseFloat(goldInput)||savedGold||null,   [goldInput,savedGold]);
  const silverPerGram = useMemo(()=>parseFloat(silverInput)||savedSilver||null,[silverInput,savedSilver]);

  const savePrice = () => {
    if(parseFloat(goldInput)>0)   { setSavedGold(parseFloat(goldInput));   localStorage.setItem('bk_gold',goldInput); }
    if(parseFloat(silverInput)>0) { setSavedSilver(parseFloat(silverInput)); localStorage.setItem('bk_silver',silverInput); }
  };

  const alloyCostPerGram = useCallback((alloy)=>{
    if(alloy.isSilver)   return silverPerGram;
    if(!goldPerGram)     return null;
    if(alloy.isPlatinum) return goldPerGram*1.65;
    return goldPerGram*alloy.purity;
  },[goldPerGram,silverPerGram]);

  const [job,setJob] = useState({
    jobType:"Custom Engagement Ring", clientName:"", metal:"18k_y",
    metalWeight:"", deposit:"50", notes:"",
  });
  const set = (k,v) => setJob(p=>({...p,[k]:v}));

  const [stones,   setStones  ] = useState([]);
  const [newStone, setNewStone] = useState({shape:"Round Brilliant",carats:"",qty:1,pricePerCt:""});
  const [findings, setFindings] = useState("");
  const [casting,  setCasting ] = useState("");
  const [finishing,setFinishing] = useState("");

  const [labourMode,    setLabourMode   ] = useState("hourly");
  const [labourHours,   setLabourHours  ] = useState("");
  const [hourlyRate,    setHourlyRate   ] = useState("85");
  const [flatRate,      setFlatRate     ] = useState("");
  const [flatRateNote,  setFlatRateNote ] = useState("");
  const [wideRingSurcharge, setWideRingSurcharge] = useState(false);

  const [metalMargin, setMetalMargin] = useState(35);
  const [stoneMargin, setStoneMargin] = useState(35);

  const [activeTab,    setActiveTab   ] = useState("quote");
  const [showInternal, setShowInternal] = useState(false);
  const [quoteNum,     setQuoteNum    ] = useState(()=>initInvoiceNum());

  /* ── Calculations ── */
  const selectedAlloy  = ALLOYS.find(a=>a.key===job.metal);
  const metalCostPerG  = alloyCostPerGram(selectedAlloy)||0;
  const metalCostRaw   = metalCostPerG*(parseFloat(job.metalWeight)||0);
  const metalPrice     = metalCostRaw*(1+metalMargin/100);

  const stoneCostRaw   = stones.reduce((s,st)=>s+parseFloat(st.carats)*parseFloat(st.pricePerCt)*parseInt(st.qty||1),0);
  const stonePrice     = stoneCostRaw*(1+stoneMargin/100);

  const miscCostRaw    = (parseFloat(findings)||0)+(parseFloat(casting)||0)+(parseFloat(finishing)||0);
  const miscPrice      = miscCostRaw*(1+metalMargin/100);

  const hourlyLabour   = labourMode!=="flat"   ? (parseFloat(labourHours)||0)*(parseFloat(hourlyRate)||0) : 0;
  const flatLabour     = labourMode!=="hourly" ? (parseFloat(flatRate)||0) : 0;
  const labourTotal    = hourlyLabour+flatLabour;

  const materialsSubtotal = metalPrice+stonePrice+miscPrice;
  const labourSubtotal    = labourTotal;
  const subtotal          = materialsSubtotal+labourSubtotal;
  const gst               = subtotal*GST_RATE;
  const pst               = materialsSubtotal*PST_RATE;
  const totalWithTax      = subtotal+gst+pst;
  const depositPct        = parseFloat(job.deposit)||0;
  const depositAmount     = totalWithTax*(depositPct/100);
  const balanceDue        = totalWithTax-depositAmount;

  const totalMarginAmt = materialsSubtotal-(metalCostRaw+stoneCostRaw+miscCostRaw);

  const addStone = () => {
    if(!newStone.carats||!newStone.pricePerCt) return;
    setStones(p=>[...p,{...newStone,id:uid()}]);
    setNewStone({shape:"Round Brilliant",carats:"",qty:1,pricePerCt:""});
  };

  const applyFromSizing = ({flatRate:fr, flatRateNote:fn, wideRing}) => {
    setFlatRate(String(fr));
    setFlatRateNote(fn);
    setLabourMode("flat");
    setWideRingSurcharge(wideRing);
    set("jobType","Ring Sizing");
    setActiveTab("quote");
  };

  /* ── Export ── */
  const exportQuote = () => {
    const lineItems = [];
    if(metalCostRaw>0)
      lineItems.push({label:selectedAlloy.label, description:`${job.metalWeight}g — ${selectedAlloy.label}`, amount:metalPrice});
    stones.forEach(s=>{
      const price=parseFloat(s.carats)*parseFloat(s.pricePerCt)*parseInt(s.qty||1)*(1+stoneMargin/100);
      lineItems.push({label:`${s.qty>1?s.qty+"× ":""}${s.shape}`,description:`${s.carats}ct ${s.shape} stone${parseInt(s.qty||1)>1?"s":""}`,amount:price});
    });
    if(parseFloat(findings)>0)  lineItems.push({label:"Findings & Components",description:"",amount:(parseFloat(findings)||0)*(1+metalMargin/100)});
    if(parseFloat(casting)>0)   lineItems.push({label:"Casting / 3D Print",  description:"",amount:(parseFloat(casting)||0)*(1+metalMargin/100)});
    if(parseFloat(finishing)>0) lineItems.push({label:"Finishing & Polishing",description:"",amount:(parseFloat(finishing)||0)*(1+metalMargin/100)});
    if(hourlyLabour>0) lineItems.push({label:"Professional Labour",description:`${labourHours}h @ $${hourlyRate}/h`,amount:hourlyLabour,isLabour:true});
    if(flatLabour>0)   lineItems.push({label:"Service Fee",description:flatRateNote||"Flat rate service",amount:flatLabour,isLabour:true});

    const html = buildInvoiceHTML({
      clientName:job.clientName, jobType:job.jobType,
      quoteDate:today(), quoteNum,
      lineItems, materialsSubtotal, labourSubtotal, subtotal,
      gst, pst, totalWithTax,
      depositPct, depositAmount, balanceDue,
      notes:job.notes, wideRingSurcharge,
    });

    // Open in new tab (mobile-safe)
    const blob = new Blob([html], {type:'text/html'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 10000);
  };

  const newQuote = () => {
    set("clientName",""); set("metalWeight",""); set("notes","");
    setStones([]); setFindings(""); setCasting(""); setFinishing("");
    setLabourHours(""); setFlatRate(""); setFlatRateNote(""); setWideRingSurcharge(false);
    const next = getNextInvoiceNum();
    setQuoteNum(next);
  };

  /* ─────────────────────────────────────────────────────────────── */
  return (
    <div style={{minHeight:"100vh",background:"#0d0b08",color:"#f5ead0",fontFamily:"'DM Sans',sans-serif",paddingBottom:80}}>

      {/* ── Header ── */}
      <div style={{padding:"20px 20px 16px",borderBottom:"1px solid rgba(212,175,55,0.18)",background:"linear-gradient(180deg,rgba(212,175,55,0.09) 0%,transparent 100%)"}}>
        <div style={{maxWidth:920,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:12}} className="header-row">
          <div>
            <div style={{fontSize:10,letterSpacing:"0.22em",color:"#a07c30",textTransform:"uppercase",marginBottom:4}}>BK Collective</div>
            <h1 style={{margin:0,fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700}}>Job Quoting Calculator</h1>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}} className="header-quotnum">
            <div style={{fontSize:11,color:"#4a3e28"}}>Quote #</div>
            <input style={{...inp,width:120,fontSize:12}} value={quoteNum} onChange={e=>setQuoteNum(e.target.value)}/>
          </div>
        </div>
      </div>

      {/* ── Price Panel ── */}
      <div style={{maxWidth:920,margin:"0 auto",padding:"16px 16px 0"}}>
        <div style={{background:"rgba(212,175,55,0.05)",border:"1px solid rgba(212,175,55,0.15)",borderRadius:12,padding:"16px 18px"}}>
          <div style={{fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",color:"#6b6047",marginBottom:12}}>VBCE Sell Prices Today</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:12,alignItems:"end",marginBottom:12}} className="grid-price">
            <div>
              <Lbl hint="Fine gold (999) CAD/g — from VBCE">Fine Gold (CAD/g)</Lbl>
              <input style={inp} type="number" min="0" step="0.01"
                placeholder={savedGold?`Saved: $${savedGold.toFixed(2)}`:"e.g. 108.50"}
                value={goldInput} onChange={e=>setGoldInput(e.target.value)}/>
            </div>
            <div>
              <Lbl hint="Fine silver (999) CAD/g — from VBCE">Fine Silver (CAD/g)</Lbl>
              <input style={inp} type="number" min="0" step="0.01"
                placeholder={savedSilver?`Saved: $${savedSilver.toFixed(2)}`:"e.g. 1.38"}
                value={silverInput} onChange={e=>setSilverInput(e.target.value)}/>
            </div>
            <button onClick={savePrice} style={{background:"rgba(212,175,55,0.15)",border:"1px solid rgba(212,175,55,0.4)",color:"#d4af37",borderRadius:8,padding:"9px 18px",cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap",alignSelf:"flex-end"}}>
              Save
            </button>
          </div>

          {goldPerGram&&(
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
              {ALLOYS.filter(a=>!a.isSilver&&!a.isPlatinum).map(a=>(
                <div key={a.key} style={{background:"rgba(255,255,255,0.04)",borderRadius:7,padding:"4px 10px",borderLeft:`2px solid ${a.color}`}}>
                  <div style={{fontSize:9,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.05em"}}>{a.label}</div>
                  <div style={{fontSize:12,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:"#c8b88a"}}>{fmtG(goldPerGram*a.purity)}</div>
                </div>
              ))}
            </div>
          )}

          <div style={{display:"flex",gap:20,flexWrap:"wrap",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span style={{fontSize:11,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em"}}>Silver Markup:</span>
              {[2,3,4].map(m=><button key={m} onClick={()=>setSilverMarkup(m)} style={pill(silverMarkup===m)}>{m}×</button>)}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:11,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em"}}>Metal/Misc Margin:</span>
              <input style={{...inp,width:60}} type="number" min="0" max="200" value={metalMargin} onChange={e=>setMetalMargin(parseFloat(e.target.value)||0)}/>
              <span style={{fontSize:12,color:"#6b6047"}}>%</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:11,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em"}}>Stone Margin:</span>
              <input style={{...inp,width:60}} type="number" min="0" max="200" value={stoneMargin} onChange={e=>setStoneMargin(parseFloat(e.target.value)||0)}/>
              <span style={{fontSize:12,color:"#6b6047"}}>%</span>
            </div>
          </div>
          <div style={{fontSize:10,color:"#2e2510",marginTop:10}}>
            Margins apply to materials only (metals, stones, findings, casting, finishing). Labour is always passed through at cost.
          </div>
        </div>
      </div>

      {/* ── Tabs ── */}
      <div style={{maxWidth:920,margin:"14px auto 0",padding:"0 16px"}}>
        <div style={{display:"flex",gap:6}} className="tabs">
          {[["quote","✦ Build Quote"],["sizing","◯ Ring Sizing"],["alloys","⬡ Alloy Table"]].map(([id,label])=>(
            <button key={id} onClick={()=>setActiveTab(id)} style={{
              background:activeTab===id?"rgba(212,175,55,0.15)":"transparent",
              border:`1px solid ${activeTab===id?"rgba(212,175,55,0.45)":"rgba(255,255,255,0.07)"}`,
              color:activeTab===id?"#d4af37":"#4a3e28",
              borderRadius:8,padding:"8px 18px",cursor:"pointer",fontSize:13,
              fontWeight:activeTab===id?600:400,transition:"all 0.15s",flexShrink:0,
            }}>{label}</button>
          ))}
        </div>
      </div>

      {/* ── Tab content ── */}
      <div style={{maxWidth:920,margin:"0 auto",padding:"20px 16px"}}>

        {activeTab==="sizing"&&<RingSizingPanel onApplyToQuote={applyFromSizing}/>}
        {activeTab==="alloys"&&<AlloyTable alloys={ALLOYS} alloyCostPerGram={alloyCostPerGram} silverMarkup={silverMarkup}/>}

        {activeTab==="quote"&&(
          <div style={{display:"flex",flexDirection:"column",gap:24}}>

            {/* Job Details */}
            <Sec title="Job Details">
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}} className="grid-2">
                <div><Lbl>Client Name</Lbl><input style={inp} placeholder="e.g. Sarah M." value={job.clientName} onChange={e=>set("clientName",e.target.value)}/></div>
                <div><Lbl>Job Type</Lbl>
                  <select style={sel} value={job.jobType} onChange={e=>set("jobType",e.target.value)}>
                    {JOB_TYPES.map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
              </div>
            </Sec>

            {/* Metal */}
            <Sec title="Metal">
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12}} className="grid-2">
                <div><Lbl>Alloy</Lbl>
                  <select style={sel} value={job.metal} onChange={e=>set("metal",e.target.value)}>
                    {ALLOYS.map(a=><option key={a.key} value={a.key}>{a.label}</option>)}
                  </select>
                </div>
                <div><Lbl>Weight (g)</Lbl><input style={inp} type="number" min="0" step="0.1" placeholder="e.g. 5.2" value={job.metalWeight} onChange={e=>set("metalWeight",e.target.value)}/></div>
              </div>
              {job.metalWeight&&metalCostPerG>0&&(
                <div style={{marginTop:10,display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}} className="grid-4">
                  {[
                    {l:"VBCE Cost/g",     v:fmtG(metalCostPerG),         accent:false},
                    {l:"Your cost",        v:fmtCAD(metalCostRaw),        accent:false},
                    {l:`Margin (${metalMargin}%)`,v:fmtCAD(metalPrice-metalCostRaw),accent:false},
                    {l:"Client price",     v:fmtCAD(metalPrice),          accent:true},
                  ].map(({l,v,accent})=>(
                    <div key={l} style={{background:accent?"rgba(212,175,55,0.09)":"rgba(255,255,255,0.04)",border:`1px solid ${accent?"rgba(212,175,55,0.22)":"rgba(255,255,255,0.06)"}`,borderRadius:8,padding:"9px 12px"}}>
                      <div style={{fontSize:9,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>{l}</div>
                      <div style={{fontSize:14,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:accent?"#d4af37":"#f5ead0"}}>{v}</div>
                    </div>
                  ))}
                </div>
              )}
            </Sec>

            {/* Stones */}
            <Sec title="Stones">
              {stones.length>0&&(
                <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:12}}>
                  {stones.map(s=>{
                    const rawCost=parseFloat(s.carats)*parseFloat(s.pricePerCt)*parseInt(s.qty||1);
                    const clientPrice=rawCost*(1+stoneMargin/100);
                    return (
                      <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"9px 12px",gap:8,flexWrap:"wrap"}}>
                        <span style={{fontSize:13}}>{s.qty}× {s.shape} — {s.carats}ct @ ${s.pricePerCt}/ct</span>
                        <div style={{display:"flex",alignItems:"center",gap:12}}>
                          <span style={{fontSize:11,color:"#4a3e28"}}>cost {fmtCAD(rawCost)}</span>
                          <span style={{color:"#d4af37",fontFamily:"'Cormorant Garamond',serif",fontSize:15}}>→ {fmtCAD(clientPrice)}</span>
                          <button onClick={()=>setStones(p=>p.filter(x=>x.id!==s.id))} style={{background:"none",border:"none",color:"#3a3020",cursor:"pointer",fontSize:15,padding:"0 4px"}}>✕</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr auto",gap:8,alignItems:"end"}} className="stone-row">
                <div><Lbl>Shape</Lbl><select style={sel} value={newStone.shape} onChange={e=>setNewStone(p=>({...p,shape:e.target.value}))}>{STONE_SHAPES.map(s=><option key={s}>{s}</option>)}</select></div>
                <div><Lbl>Carats</Lbl><input style={inp} type="number" min="0" step="0.01" placeholder="1.00" value={newStone.carats} onChange={e=>setNewStone(p=>({...p,carats:e.target.value}))}/></div>
                <div><Lbl>$/ct CAD</Lbl><input style={inp} type="number" min="0" placeholder="800" value={newStone.pricePerCt} onChange={e=>setNewStone(p=>({...p,pricePerCt:e.target.value}))}/></div>
                <div><Lbl>Qty</Lbl><input style={inp} type="number" min="1" value={newStone.qty} onChange={e=>setNewStone(p=>({...p,qty:e.target.value}))}/></div>
                <button onClick={addStone} className="stone-add" style={{background:"rgba(212,175,55,0.12)",border:"1px solid rgba(212,175,55,0.35)",color:"#d4af37",borderRadius:7,padding:"9px 14px",cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap",alignSelf:"flex-end"}}>+ Add</button>
              </div>
            </Sec>

            {/* Labour */}
            <Sec title="Labour">
              <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap"}}>
                {[["hourly","Hourly"],["flat","Flat Rate"],["both","Both"]].map(([m,l])=>(
                  <button key={m} onClick={()=>setLabourMode(m)} style={pill(labourMode===m)}>{l}</button>
                ))}
                <span style={{fontSize:11,color:"#3a3020",alignSelf:"center",marginLeft:2}}>No margin on labour</span>
              </div>
              {(labourMode==="hourly"||labourMode==="both")&&(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}} className="grid-2">
                  <div><Lbl>Hours</Lbl><input style={inp} type="number" min="0" step="0.5" placeholder="e.g. 6" value={labourHours} onChange={e=>setLabourHours(e.target.value)}/></div>
                  <div><Lbl>Hourly Rate (CAD)</Lbl><input style={inp} type="number" min="0" value={hourlyRate} onChange={e=>setHourlyRate(e.target.value)}/></div>
                </div>
              )}
              {(labourMode==="flat"||labourMode==="both")&&(
                <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:12,marginBottom:12}} className="grid-2">
                  <div><Lbl hint="e.g. ring sizing fee">Flat Rate ($)</Lbl><input style={inp} type="number" min="0" placeholder="e.g. 150" value={flatRate} onChange={e=>setFlatRate(e.target.value)}/></div>
                  <div><Lbl hint="Appears on client quote">Description</Lbl><input style={inp} placeholder="e.g. 14KY ring sizing up 1 size" value={flatRateNote} onChange={e=>setFlatRateNote(e.target.value)}/></div>
                </div>
              )}
              {wideRingSurcharge&&(
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(251,146,60,0.08)",border:"1px solid rgba(251,146,60,0.25)",borderRadius:8,padding:"9px 12px",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontSize:12,color:"#fb923c"}}>⚠ Wide ring (&gt;3mm) surcharge flagged</span>
                  <button onClick={()=>setWideRingSurcharge(false)} style={{background:"none",border:"none",color:"#4a3e28",cursor:"pointer",fontSize:12}}>Remove ✕</button>
                </div>
              )}
              {labourTotal>0&&<div style={{marginTop:8,fontSize:12,color:"#6b6047"}}>Labour total: <span style={{color:"#d4af37",fontWeight:600,fontFamily:"'Cormorant Garamond',serif",fontSize:14}}>{fmtCAD(labourTotal)}</span></div>}
            </Sec>

            {/* Additional Costs */}
            <Sec title="Additional Material Costs">
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}} className="grid-3">
                <div><Lbl hint="Metal margin applied">Findings / Components ($)</Lbl><input style={inp} type="number" min="0" placeholder="0" value={findings} onChange={e=>setFindings(e.target.value)}/></div>
                <div><Lbl hint="Metal margin applied">Casting / 3D Print ($)</Lbl><input style={inp} type="number" min="0" placeholder="0" value={casting} onChange={e=>setCasting(e.target.value)}/></div>
                <div><Lbl hint="Metal margin applied">Finishing / Polishing ($)</Lbl><input style={inp} type="number" min="0" placeholder="0" value={finishing} onChange={e=>setFinishing(e.target.value)}/></div>
              </div>
            </Sec>

            {/* Deposit */}
            <Sec title="Deposit">
              <div style={{display:"grid",gridTemplateColumns:"1fr 3fr",gap:12,alignItems:"center"}} className="grid-2">
                <div><Lbl>Deposit Required %</Lbl><input style={inp} type="number" min="0" max="100" value={job.deposit} onChange={e=>set("deposit",e.target.value)}/></div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:22}}>
                  <div style={{background:"rgba(212,175,55,0.06)",border:"1px solid rgba(212,175,55,0.15)",borderRadius:8,padding:"9px 12px"}}>
                    <div style={{fontSize:9,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Deposit Amount</div>
                    <div style={{fontSize:15,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:"#d4af37"}}>{fmtCAD(depositAmount)}</div>
                  </div>
                  <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"9px 12px"}}>
                    <div style={{fontSize:9,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Balance on Completion</div>
                    <div style={{fontSize:15,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:"#f5ead0"}}>{fmtCAD(balanceDue)}</div>
                  </div>
                </div>
              </div>
            </Sec>

            {/* Notes */}
            <Sec title="Notes for Client">
              <textarea style={{...inp,minHeight:60,resize:"vertical"}} placeholder="e.g. client-supplied stone, complimentary cleaning included…" value={job.notes} onChange={e=>set("notes",e.target.value)}/>
            </Sec>

            {/* ── Summary card ── */}
            <div style={{background:"linear-gradient(135deg,rgba(212,175,55,0.09) 0%,rgba(212,175,55,0.03) 100%)",border:"1px solid rgba(212,175,55,0.28)",borderRadius:14,padding:22}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
                <h2 style={{margin:0,fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700}}>Summary</h2>
                <button onClick={()=>setShowInternal(p=>!p)} style={{background:"none",border:"1px solid rgba(255,255,255,0.08)",color:"#4a3e28",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:11}}>
                  {showInternal?"Hide":"Show"} internal breakdown
                </button>
              </div>

              {showInternal&&(
                <div style={{marginBottom:18,background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"12px 16px",display:"flex",flexDirection:"column",gap:5}}>
                  <div style={{fontSize:10,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:5}}>Internal — Not Visible to Client</div>
                  {[
                    ["Metal cost (VBCE)",          metalCostRaw],
                    [`Metal margin (${metalMargin}%)`,metalPrice-metalCostRaw],
                    ["Stone cost",                 stoneCostRaw],
                    [`Stone margin (${stoneMargin}%)`,stonePrice-stoneCostRaw],
                    ["Misc materials cost",        miscCostRaw],
                    [`Misc margin (${metalMargin}%)`,miscPrice-miscCostRaw],
                    ["Labour (no margin)",         labourTotal],
                    ["─── Materials subtotal",     materialsSubtotal,"sep"],
                    ["Labour subtotal",            labourSubtotal],
                    ["Pre-tax subtotal",           subtotal,"sep"],
                    ["GST 5%",                     gst],
                    ["PST 7% (materials)",         pst],
                    ["Total margin earned",        totalMarginAmt,"highlight"],
                  ].map(([l,v,flag])=>(
                    <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:flag==="highlight"?"#34d399":flag==="sep"?"#c8b88a":"#5a4e38",borderTop:flag==="sep"?"1px solid rgba(212,175,55,0.1)":"none",paddingTop:flag==="sep"?6:0,fontWeight:flag==="highlight"?700:400}}>
                      <span>{l}</span>
                      <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14}}>{fmtCAD(v)}</span>
                    </div>
                  ))}
                </div>
              )}

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:16}} className="grid-4">
                {[
                  {l:"Materials",  v:fmtCAD(materialsSubtotal),c:"#f5ead0"},
                  {l:"Labour",     v:fmtCAD(labourSubtotal),   c:"#f5ead0"},
                  {l:"GST 5%",     v:fmtCAD(gst),              c:"#9ca3af"},
                  {l:"PST 7%",     v:fmtCAD(pst),              c:"#9ca3af"},
                ].map(({l,v,c})=>(
                  <div key={l} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"9px 12px"}}>
                    <div style={{fontSize:9,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>{l}</div>
                    <div style={{fontSize:14,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:c}}>{v}</div>
                  </div>
                ))}
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:18}} className="summary-3">
                {[
                  {l:"Total (incl. tax)",        v:fmtCAD(totalWithTax),  accent:true },
                  {l:`Deposit (${depositPct}%)`, v:fmtCAD(depositAmount), accent:false},
                  {l:"Balance on Completion",    v:fmtCAD(balanceDue),    accent:false},
                ].map(({l,v,accent})=>(
                  <div key={l} style={{background:accent?"rgba(212,175,55,0.12)":"rgba(255,255,255,0.04)",border:`1px solid ${accent?"rgba(212,175,55,0.35)":"rgba(255,255,255,0.07)"}`,borderRadius:10,padding:"12px 14px"}}>
                    <div style={{fontSize:9,color:accent?"#a07c30":"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4}}>{l}</div>
                    <div style={{fontSize:20,fontWeight:700,color:accent?"#d4af37":"#f5ead0",fontFamily:"'Cormorant Garamond',serif"}}>{v}</div>
                  </div>
                ))}
              </div>

              <div style={{display:"flex",gap:8}} className="action-btns">
                <button onClick={exportQuote} style={{
                  flex:2,background:"rgba(212,175,55,0.14)",border:"1px solid rgba(212,175,55,0.4)",
                  color:"#d4af37",borderRadius:10,padding:"13px 20px",
                  cursor:"pointer",fontSize:14,fontWeight:600,letterSpacing:"0.04em",
                }}>
                  Export Client Quote ↗
                </button>
                <button onClick={newQuote} style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",color:"#3a3020",borderRadius:10,padding:"13px 14px",cursor:"pointer",fontSize:13}}>
                  New Quote
                </button>
              </div>
              <div style={{marginTop:8,fontSize:10,color:"#2e2510",textAlign:"center"}}>
                Margins, costs & internal notes are never included in the client-facing export.
              </div>
            </div>

          </div>
        )}
      </div>
    </div>
  );
}

const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(<JobQuotingCalculator/>);
</script>

<script>
/* ─── PWA Setup ──────────────────────────────────────────────────── */
(function(){
  // Inject Web App Manifest via blob
  try {
    const manifest = {
      name: "BK Collective — Quote Calculator",
      short_name: "BK Quote",
      description: "Job quoting calculator for BK Collective jewellery studio",
      start_url: ".",
      display: "standalone",
      orientation: "portrait-primary",
      background_color: "#0d0b08",
      theme_color: "#0d0b08",
      categories: ["business","finance"],
      icons: [
        {
          src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%230d0b08'/%3E%3Ctext x='96' y='130' text-anchor='middle' font-family='Georgia,serif' font-size='100' fill='%23d4af37'%3E✦%3C/text%3E%3C/svg%3E",
          sizes: "192x192",
          type: "image/svg+xml",
          purpose: "any maskable"
        }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type:"application/manifest+json"});
    const url  = URL.createObjectURL(blob);
    const link = document.createElement("link");
    link.rel   = "manifest";
    link.href  = url;
    document.head.appendChild(link);
  } catch(e) { console.warn("Manifest inject failed:", e); }

  // Register service worker (enables some offline caching)
  if('serviceWorker' in navigator) {
    const swSrc = `
const CACHE = 'bk-quote-v1';
const URLS  = [
  'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap',
  'https://unpkg.com/react@18/umd/react.production.min.js',
  'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
  'https://unpkg.com/@babel/standalone/babel.min.js'
];
self.addEventListener('install', e => {
  self.skipWaiting();
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS).catch(()=>{})));
});
self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).then(res => {
      if(res && res.status === 200 && e.request.method === 'GET') {
        const clone = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
      }
      return res;
    }))
  );
});`;
    try {
      const swBlob = new Blob([swSrc], {type:"text/javascript"});
      const swUrl  = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl, {scope: "./"})
        .then(()=>console.log("SW registered"))
        .catch(e=>console.warn("SW error:", e));
    } catch(e) { console.warn("SW setup failed:", e); }
  }

  // iOS home screen hint (only shown once)
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isInApp = window.navigator.standalone === true;
  const hintShown = localStorage.getItem('bk_ios_hint');
  if(isIOS && !isInApp && !hintShown) {
    setTimeout(()=>{
      const bar = document.createElement('div');
      bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1a1508;border-top:1px solid rgba(212,175,55,0.3);padding:12px 16px 20px;font-family:DM Sans,sans-serif;font-size:12px;color:#c8b88a;text-align:center;z-index:9999;display:flex;align-items:center;justify-content:space-between;gap:12px;';
      bar.innerHTML = '<span>Tap <strong style="color:#d4af37">Share</strong> → <strong style="color:#d4af37">Add to Home Screen</strong> to install as an app</span><button onclick="this.parentNode.remove();localStorage.setItem(\'bk_ios_hint\',\'1\')" style="background:none;border:1px solid rgba(212,175,55,0.3);color:#6b6047;border-radius:5px;padding:5px 10px;cursor:pointer;font-size:11px;flex-shrink:0;">Dismiss</button>';
      document.body.appendChild(bar);
      localStorage.setItem('bk_ios_hint','1');
    }, 2000);
  }

  // Android install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.createElement('button');
    btn.style.cssText = 'position:fixed;bottom:16px;right:16px;background:rgba(212,175,55,0.9);border:none;color:#0d0b08;border-radius:10px;padding:12px 18px;font-family:DM Sans,sans-serif;font-size:13px;font-weight:600;cursor:pointer;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.5);';
    btn.textContent = '⬇ Install App';
    btn.onclick = async () => {
      btn.remove();
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    };
    document.body.appendChild(btn);
  });
})();
</script>
</body>
</html>
