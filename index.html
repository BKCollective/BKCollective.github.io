<script type="module">

/* ── Constants ─────────────────────────────────────────────────────── */

const STONE_SHAPES = ["Round Brilliant","Princess","Oval","Cushion","Emerald","Pear","Marquise","Radiant","Asscher","Heart"];
const JOB_TYPES    = ["Custom Engagement Ring","Wedding Band","Pendant","Earrings (pair)","Bracelet","Brooch","Production Piece","Repair / Rework","Ring Sizing","Other"];
const SIZING_METALS = ["Silver","10KY","14KY","18KY","10KW","14KW","18KW"];
const SIZING_TABLE  = {
  "Down 1–2 Sizes": [80,  100, 110, 130, 120, 130, 150],
  "Down 3+ Sizes":  [null,null,null,null,null,null,null],
  "Up 1 Size":      [90,  130, 150, 170, 150, 170, 190],
  "Up 2 Sizes":     [110, 150, 170, 190, 170, 190, 210],
  "Up 3+ Sizes":    [null,null,null,null,null,null,null],
};
const SIZING_UP  = ["Up 1 Size","Up 2 Sizes","Up 3+ Sizes"];
const SIZING_EST = ["Down 3+ Sizes","Up 3+ Sizes"];
const BIZ = {
  name:"BK Collective Ltd.", address:"340 David Rd, Bowen Island, BC, V0N 1G1",
  email:"bkcollectivedesigns@gmail.com", phone:"(604) 813-1735",
  etransfer:"bkcollectivedesigns@gmail.com",
};
const GST_RATE = 0.05;
const PST_RATE = 0.07;

/* ── Utilities ─────────────────────────────────────────────────────── */
const fmtCAD = (n) => `$${Number(n||0).toLocaleString("en-CA",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fmtG   = (n) => `$${Number(n||0).toFixed(2)}/g`;
const uid    = () => Math.random().toString(36).slice(2);
const today  = () => new Date().toLocaleDateString("en-CA",{year:"numeric",month:"long",day:"numeric"});

const getNextInvNum = () => {
  const n = parseInt(localStorage.getItem('bk_inv_count')||'0') + 1;
  localStorage.setItem('bk_inv_count', String(n));
  const num = `INV${String(n).padStart(3,'0')}`;
  localStorage.setItem('bk_current_inv', num);
  return num;
};
const initInvNum = () => {
  const e = localStorage.getItem('bk_current_inv');
  return e || getNextInvNum();
};

/* ── Shared widget styles ──────────────────────────────────────────── */
const inp = {
  background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,220,100,0.14)",
  borderRadius:7, color:"#f5ead0", padding:"9px 12px", fontSize:13,
  outline:"none", fontFamily:"inherit", width:"100%",
};
const sel  = {...inp, cursor:"pointer"};
const pill = (active, col="#d4af37") => ({
  background: active ? `rgba(${col==="#d4af37"?"212,175,55":col==="#34d399"?"52,211,153":"96,165,250"},0.16)` : "rgba(255,255,255,0.04)",
  border: `1px solid ${active?col:"rgba(255,255,255,0.09)"}`,
  color: active ? col : "#4a3e28",
  borderRadius:7, padding:"7px 14px", cursor:"pointer", fontSize:12,
  fontWeight: active?600:400, transition:"all 0.15s",
});

/* ── Invoice HTML builder (pure JS, no JSX needed) ─────────────────── */
function buildInvoiceHTML(data) {
  const { clientName,jobType,quoteDate,quoteNum,lineItems,materialsSubtotal,labourSubtotal,subtotal,gst,pst,totalWithTax,depositPct,depositAmount,balanceDue,notes,wideRingSurcharge } = data;
  const rows = lineItems.map(it=>`
    <tr>
      <td class="iname">${it.label}</td>
      <td class="idesc">${it.description||'—'}</td>
      <td class="iamt">${fmtCAD(it.amount)}</td>
    </tr>`).join('');
  return `<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>${quoteNum} — ${clientName||'Client'}</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>

.bcon a{color:#8a7a60;text-decoration:none;}

table{width:100%;border-collapse:collapse;}

.pbar{display:flex;justify-content:center;gap:12px;padding:20px;background:#1c1810;border-bottom:1px solid rgba(200,168,75,0.2);}

.cbtn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:#8a7a60;padding:10px 20px;font-family:'Jost',sans-serif;font-size:13px;cursor:pointer;border-radius:5px;}
@media print{.pbar{display:none!important;}body{padding:0;}.page{max-width:none;}@page{margin:0;size:A4;}}
</style></head><body>
<div class="pbar"><button class="pbtn" onclick="window.print()">⬆ Print / Save as PDF</button><button class="cbtn" onclick="window.close()">Close</button></div>
<div class="page">
  <div class="hdr">
    <div>
      <div class="btag">Jewellery Design &amp; Goldsmithing</div>
      <div class="bname">${BIZ.name}</div>
      <div class="bcon">${BIZ.address}<br/><a href="mailto:${BIZ.email}">${BIZ.email}</a><br/>${BIZ.phone}</div>
    </div>
    <div class="dblock">
      <div class="dtype">QUOTE</div>
      <div class="dmeta"><div><span class="num">${quoteNum}</span></div><div>Date: ${quoteDate}</div><div>Valid 30 days</div></div>
    </div>
  </div>
  <div class="grule"></div>
  <div class="body">
    <div class="mrow">
      <div><div class="mlabel">Prepared For</div><div class="mval">${clientName||'—'}</div></div>

      <tbody class="sub">
        <tr><td></td><td>Materials Subtotal</td><td class="r">${fmtCAD(materialsSubtotal)}</td></tr>
        <tr><td></td><td>Labour Subtotal</td><td class="r">${fmtCAD(labourSubtotal)}</td></tr>
        <tr class="sep str"><td></td><td>Subtotal</td><td class="r">${fmtCAD(subtotal)}</td></tr>
        <tr><td></td><td style="color:#9a8060">GST (5%)</td><td class="r" style="color:#9a8060">${fmtCAD(gst)}</td></tr>

      <div class="deprow depbal"><div><div class="deplbl">Balance Due</div><div class="depsub">Due on completion / pickup</div></div><div class="depamt">${fmtCAD(balanceDue)}</div></div>
    </div>`:''}
    ${wideRingSurcharge?`<div class="surch">⚠ Ring is wider than 3mm — an additional wide-ring surcharge will apply. Amount to be confirmed.</div>`:''}

      <div><div class="plbl">Payment Accepted Via</div><div class="pdet">E-Transfer: <a href="mailto:${BIZ.etransfer}">${BIZ.etransfer}</a><br/>Payable to: ${BIZ.name}</div></div>

}

/* ── Lbl ───────────────────────────────────────────────────────────── */
function Lbl({children, hint}) {
  return html`<div style=${{marginBottom:5}}>
    <div style=${{fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase",color:"#6b6047"}}>${children}</div>
    ${hint && html`<div style=${{fontSize:10,color:"#3a3020",marginTop:2}}>${hint}</div>`}
  </div>`;
}

/* ── Sec ───────────────────────────────────────────────────────────── */
function Sec({title,children}) {
  return html`<section>
    <div style=${{fontSize:11,letterSpacing:"0.14em",textTransform:"uppercase",color:"#4a3e28",fontWeight:500,marginBottom:14,paddingBottom:8,borderBottom:"1px solid rgba(212,175,55,0.08)"}}>
      ${title}
    </div>
    ${children}
  </section>`;
}

/* ── Ring Sizing Panel ─────────────────────────────────────────────── */
function RingSizingPanel({ onApplyToQuote }) {
  const [sizeMetal, setSizeMetal] = useState("14KY");
  const [sizeDir,   setSizeDir  ] = useState("Up 1 Size");
  const [wideRing,  setWideRing ] = useState(false);
  const metalIdx = SIZING_METALS.indexOf(sizeMetal);
  const fr       = SIZING_TABLE[sizeDir]?.[metalIdx];
  const isEst    = SIZING_EST.includes(sizeDir) || fr === null;
  const isUp     = SIZING_UP.includes(sizeDir);

  return html`<div style=${{display:"flex",flexDirection:"column",gap:20}}>
    <div style=${{background:"rgba(212,175,55,0.05)",border:"1px solid rgba(212,175,55,0.14)",borderRadius:12,padding:22}}>
      <div style=${{fontSize:11,letterSpacing:"0.14em",textTransform:"uppercase",color:"#6b6047",marginBottom:14}}>Ring Sizing — Flat Rate Lookup</div>
      <div style=${{fontSize:12,color:"#4a3e28",marginBottom:16,lineHeight:1.6}}>
        Rates for rings <strong style=${{color:"#a07c30"}}>≤3mm width</strong>.
        Rings >3mm subject to surcharge (TBD).
        <strong style=${{color:"#d4af37"}}> +</strong> sizing rows = flat fee only; add cost of gold on top.
      </div>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}} className="grid-2">
        <div>
          <${Lbl}>Metal<//>
          <select style=${sel} value=${sizeMetal} onChange=${e=>setSizeMetal(e.target.value)}>
            ${SIZING_METALS.map(m => html`<option key=${m}>${m}</option>`)}
          </select>
        </div>
        <div>
          <${Lbl}>Size Change<//>
          <select style=${sel} value=${sizeDir} onChange=${e=>setSizeDir(e.target.value)}>
            ${Object.keys(SIZING_TABLE).map(k => html`<option key=${k}>${k}</option>`)}
          </select>
        </div>
      </div>
      <label style=${{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:18}}>
        <div onClick=${()=>setWideRing(p=>!p)} style=${{width:36,height:20,borderRadius:10,background:wideRing?"rgba(251,146,60,0.4)":"rgba(255,255,255,0.08)",border:`1px solid ${wideRing?"#fb923c":"rgba(255,255,255,0.12)"}`,position:"relative",transition:"all 0.2s",flexShrink:0}}>
          <div style=${{position:"absolute",top:2,left:wideRing?17:2,width:14,height:14,borderRadius:"50%",background:wideRing?"#fb923c":"#4a3e28",transition:"left 0.2s"}}/>
        </div>
        <span style=${{fontSize:12,color:wideRing?"#fb923c":"#4a3e28"}}>Ring is wider than 3mm — surcharge applies (TBD)</span>
      </label>
      <div style=${{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
        <div style=${{background:isEst?"rgba(251,146,60,0.08)":"rgba(212,175,55,0.1)",border:`1px solid ${isEst?"rgba(251,146,60,0.3)":"rgba(212,175,55,0.3)"}`,borderRadius:10,padding:"12px 20px",minWidth:170}}>
          <div style=${{fontSize:10,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4}}>${sizeMetal} — ${sizeDir}</div>
          ${isEst
            ? html`<div style=${{fontSize:18,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:"#fb923c"}}>Estimate Required</div>`
            : html`<div style=${{display:"flex",alignItems:"baseline",gap:6}}>
                <div style=${{fontSize:22,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:"#d4af37"}}>${fmtCAD(fr)}</div>
                ${isUp && html`<div style=${{fontSize:12,color:"#a07c30"}}>+ gold cost</div>`}
              </div>`}
          ${wideRing && html`<div style=${{fontSize:11,color:"#fb923c",marginTop:4}}>⚠ + wide ring surcharge (TBD)</div>`}
        </div>
        ${!isEst && html`<button
          onClick=${()=>onApplyToQuote({ flatRate:fr, wideRing, flatRateNote:`${sizeMetal} ring sizing — ${sizeDir}${isUp?" (+ gold cost)":""}` })}
          style=${{background:"rgba(212,175,55,0.12)",border:"1px solid rgba(212,175,55,0.35)",color:"#d4af37",borderRadius:8,padding:"10px 18px",cursor:"pointer",fontSize:13,fontWeight:600}}
        >Apply to Quote →</button>`}
      </div>
    </div>
    <div style=${{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:18,overflowX:"auto"}}>
      <div style=${{fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",color:"#4a3e28",marginBottom:12}}>Full Rate Table</div>
      <table style=${{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:380}}>
        <thead>
          <tr>
            <th style=${{textAlign:"left",padding:"6px 10px",color:"#6b6047",fontWeight:500,fontSize:10,letterSpacing:"0.08em"}}>Service</th>
            ${SIZING_METALS.map(m => html`<th key=${m} style=${{textAlign:"center",padding:"6px 8px",color:"#6b6047",fontWeight:500,fontSize:10}}>${m}</th>`)}
          </tr>
        </thead>

              <td style=${{padding:"8px 10px",color:"#c8b88a",fontWeight:isER?400:500}}>${row}</td>
              ${vals.map((v,i) => {
                const active = SIZING_METALS[i]===sizeMetal && row===sizeDir;
                return html`<td key=${i} style=${{textAlign:"center",padding:"8px",color:active?"#d4af37":isER||v===null?"#3a3020":"#8a7a60",fontWeight:active?700:400,background:active?"rgba(212,175,55,0.08)":"transparent"}}>
                  ${isER?"est.":v===null?"est.":`$${v}`}${isUR&&!isER&&v!==null ? html`<span style=${{color:"#a07c30",fontSize:10}}>+</span>` : ""}

          })}
        </tbody>
      </table>
      <div style=${{fontSize:10,color:"#3a3020",marginTop:8}}>All rates for rings ≤3mm. "+" = base fee only; gold cost added separately. Rings >3mm subject to surcharge (TBD).</div>
    </div>
  </div>`;
}

/* ── Alloy Table ───────────────────────────────────────────────────── */
function AlloyTable({ alloys, alloyCostPerGram, silverMarkup }) {
  const [wAlloy, setWAlloy] = useState("18k_y");
  const [wGrams, setWGrams] = useState("");
  const alloy  = alloys.find(a => a.key === wAlloy);
  const cpg    = alloyCostPerGram(alloy);
  const markup = alloy.isSilver ? silverMarkup : 2;
  const cost   = cpg && wGrams ? cpg * parseFloat(wGrams) : null;
  const sell   = cost !== null ? cost * markup : null;

  return html`<div>
    <p style=${{margin:"0 0 18px",fontSize:13,color:"#6b6047",lineHeight:1.65}}>
      Cost = VBCE fine gold price × alloy purity. Gold & Platinum = <strong style=${{color:"#d4af37"}}>2×</strong> markup. Silver = your selected markup.
    </p>
    <div style=${{display:"flex",flexDirection:"column",gap:9}}>
      ${alloys.map(a => {
        const c = alloyCostPerGram(a);
        if (!c) return html`<div key=${a.key} style=${{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:10,padding:"13px 18px",color:"#3a3020",fontSize:13}}>${a.label} — enter gold price above</div>`;
        const mu = a.isSilver ? silverMarkup : 2;
        const sv = c * mu;
        const mg = sv - c;
        return html`<div key=${a.key} style=${{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,220,100,0.07)",borderRadius:12,padding:"13px 18px",borderLeft:`3px solid ${a.color}`,display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",alignItems:"center",gap:10}} className="igrid">
          <div>
            <div style=${{fontWeight:600,fontSize:14,marginBottom:2}}>${a.label}</div>
            <div style=${{fontSize:11,color:"#4a3e28"}}>${(a.purity*100).toFixed(1)}% pure</div>
          </div>
          ${[{l:"Cost/g",v:fmtG(c),col:"#f5ead0"},{l:"Markup",v:`${mu}×`,col:"#a07c30"},{l:"Sell/g",v:fmtG(sv),col:"#d4af37"},{l:"Margin/g",v:`+$${mg.toFixed(2)}`,col:"#34d399"}].map(({l,v,col}) => html`
            <div key=${l}>
              <div style=${{fontSize:9,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>${l}</div>
              <div style=${{fontSize:15,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:col}}>${v}</div>
            </div>
          `)}
        </div>`;
      })}
    </div>
    <div style=${{marginTop:24,background:"rgba(212,175,55,0.05)",border:"1px solid rgba(212,175,55,0.14)",borderRadius:14,padding:20}}>
      <div style=${{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"#6b6047",marginBottom:14}}>Quick Weight Calculator</div>
      <div style=${{display:"flex",gap:14,alignItems:"flex-end",flexWrap:"wrap"}}>
        <div>
          <div style=${{fontSize:10,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5}}>Alloy</div>
          <select style=${{...inp,minWidth:150}} value=${wAlloy} onChange=${e=>setWAlloy(e.target.value)}>
            ${alloys.map(a => html`<option key=${a.key} value=${a.key}>${a.label}</option>`)}
          </select>
        </div>
        <div>
          <div style=${{fontSize:10,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5}}>Weight (g)</div>
          <input style=${{...inp,width:90}} type="number" min="0" step="0.1" placeholder="0.0" value=${wGrams} onChange=${e=>setWGrams(e.target.value)}/>
        </div>
        ${cost !== null && html`
          <div style=${{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"9px 14px"}}>
            <div style=${{fontSize:9,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Your Cost</div>
            <div style=${{fontSize:18,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:"#f5ead0"}}>$${cost.toFixed(2)}</div>
          </div>
          <div style=${{background:"rgba(212,175,55,0.1)",border:"1px solid rgba(212,175,55,0.25)",borderRadius:8,padding:"9px 14px"}}>
            <div style=${{fontSize:9,color:"#a07c30",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Sell (${markup}×)</div>
            <div style=${{fontSize:18,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:"#d4af37"}}>$${sell.toFixed(2)}</div>
          </div>
          <div style=${{background:"rgba(52,211,153,0.07)",border:"1px solid rgba(52,211,153,0.18)",borderRadius:8,padding:"9px 14px"}}>
            <div style=${{fontSize:9,color:"#34d399",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Margin</div>
            <div style=${{fontSize:18,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:"#34d399"}}>+$${(sell-cost).toFixed(2)}</div>
          </div>
        `}
      </div>
    </div>
  </div>`;
}

/* ── Main App ──────────────────────────────────────────────────────── */
function App() {
  const [goldInput,    setGoldInput   ] = useState("");
  const [silverInput,  setSilverInput ] = useState("");
  const [savedGold,    setSavedGold   ] = useState(() => { const v=localStorage.getItem('bk_gold'); return v?parseFloat(v):null; });
  const [savedSilver,  setSavedSilver ] = useState(() => { const v=localStorage.getItem('bk_silver'); return v?parseFloat(v):null; });
  const [silverMarkup, setSilverMarkup] = useState(2);
  const goldPerGram   = useMemo(() => parseFloat(goldInput)||savedGold||null,    [goldInput,savedGold]);
  const silverPerGram = useMemo(() => parseFloat(silverInput)||savedSilver||null, [silverInput,savedSilver]);

  const savePrice = () => {
    if(parseFloat(goldInput)>0)   { setSavedGold(parseFloat(goldInput));    localStorage.setItem('bk_gold',goldInput); }
    if(parseFloat(silverInput)>0) { setSavedSilver(parseFloat(silverInput)); localStorage.setItem('bk_silver',silverInput); }
  };
  const alloyCostPerGram = useCallback((alloy) => {
    if(alloy.isSilver)   return silverPerGram;
    if(!goldPerGram)     return null;
    if(alloy.isPlatinum) return goldPerGram*1.65;
    return goldPerGram*alloy.purity;
  }, [goldPerGram, silverPerGram]);

  const [job,setJob]     = useState({jobType:"Custom Engagement Ring",clientName:"",metal:"18k_y",metalWeight:"",deposit:"50",notes:""});
  const set              = (k,v) => setJob(p=>({...p,[k]:v}));
  const [stones,setStones]   = useState([]);
  const [newStone,setNewStone] = useState({shape:"Round Brilliant",carats:"",qty:1,pricePerCt:""});
  const [findings,setFindings] = useState("");
  const [casting,setCasting]   = useState("");
  const [finishing,setFinishing] = useState("");
  const [labourMode,setLabourMode] = useState("hourly");
  const [labourHours,setLabourHours] = useState("");
  const [hourlyRate,setHourlyRate]   = useState("85");
  const [flatRate,setFlatRate]       = useState("");
  const [flatRateNote,setFlatRateNote] = useState("");
  const [wideRingSurcharge,setWideRingSurcharge] = useState(false);
  const [metalMargin,setMetalMargin] = useState(35);
  const [stoneMargin,setStoneMargin] = useState(35);
  const [activeTab,setActiveTab]     = useState("quote");
  const [showInternal,setShowInternal] = useState(false);
  const [quoteNum,setQuoteNum]       = useState(() => initInvNum());

  const selectedAlloy  = ALLOYS.find(a=>a.key===job.metal);
  const metalCostPerG  = alloyCostPerGram(selectedAlloy)||0;
  const metalCostRaw   = metalCostPerG*(parseFloat(job.metalWeight)||0);
  const metalPrice     = metalCostRaw*(1+metalMargin/100);
  const stoneCostRaw   = stones.reduce((s,st)=>s+parseFloat(st.carats)*parseFloat(st.pricePerCt)*parseInt(st.qty||1),0);
  const stonePrice     = stoneCostRaw*(1+stoneMargin/100);
  const miscCostRaw    = (parseFloat(findings)||0)+(parseFloat(casting)||0)+(parseFloat(finishing)||0);
  const miscPrice      = miscCostRaw*(1+metalMargin/100);
  const hourlyLabour   = labourMode!=="flat"   ? (parseFloat(labourHours)||0)*(parseFloat(hourlyRate)||0) : 0;
  const flatLabour     = labourMode!=="hourly" ? (parseFloat(flatRate)||0) : 0;
  const labourTotal    = hourlyLabour+flatLabour;
  const materialsSubtotal = metalPrice+stonePrice+miscPrice;
  const labourSubtotal    = labourTotal;
  const subtotal          = materialsSubtotal+labourSubtotal;
  const gst               = subtotal*GST_RATE;
  const pst               = materialsSubtotal*PST_RATE;
  const totalWithTax      = subtotal+gst+pst;
  const depositPct        = parseFloat(job.deposit)||0;
  const depositAmount     = totalWithTax*(depositPct/100);
  const balanceDue        = totalWithTax-depositAmount;
  const totalMarginAmt    = materialsSubtotal-(metalCostRaw+stoneCostRaw+miscCostRaw);

  const addStone = () => {
    if(!newStone.carats||!newStone.pricePerCt) return;
    setStones(p=>[...p,{...newStone,id:uid()}]);
    setNewStone({shape:"Round Brilliant",carats:"",qty:1,pricePerCt:""});
  };
  const applyFromSizing = ({flatRate:fr,flatRateNote:fn,wideRing}) => {
    setFlatRate(String(fr)); setFlatRateNote(fn); setLabourMode("flat");
    setWideRingSurcharge(wideRing); set("jobType","Ring Sizing"); setActiveTab("quote");
  };
  const exportQuote = () => {
    const li = [];
    if(metalCostRaw>0) li.push({label:selectedAlloy.label,description:`${job.metalWeight}g — ${selectedAlloy.label}`,amount:metalPrice});
    stones.forEach(s=>{
      li.push({label:`${s.qty>1?s.qty+"× ":""}${s.shape}`,description:`${s.carats}ct ${s.shape} stone${parseInt(s.qty||1)>1?"s":""}`,amount:parseFloat(s.carats)*parseFloat(s.pricePerCt)*parseInt(s.qty||1)*(1+stoneMargin/100)});
    });
    if(parseFloat(findings)>0)  li.push({label:"Findings & Components",description:"",amount:(parseFloat(findings)||0)*(1+metalMargin/100)});
    if(parseFloat(casting)>0)   li.push({label:"Casting / 3D Print",   description:"",amount:(parseFloat(casting)||0)*(1+metalMargin/100)});
    if(parseFloat(finishing)>0) li.push({label:"Finishing & Polishing", description:"",amount:(parseFloat(finishing)||0)*(1+metalMargin/100)});
    if(hourlyLabour>0) li.push({label:"Professional Labour",description:`${labourHours}h @ $${hourlyRate}/h`,amount:hourlyLabour});

    const blob=new Blob([html2],{type:'text/html'});

  return html`<div style=${{minHeight:"100vh",background:"#0d0b08",color:"#f5ead0",fontFamily:"'DM Sans',sans-serif",paddingBottom:80}}>

      <div style=${{maxWidth:920,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:12}} className="header-row">

        <div style=${{display:"flex",gap:8,alignItems:"center"}} className="header-qn">

    <div style=${{maxWidth:920,margin:"0 auto",padding:"16px 16px 0"}}>

            <div><${Lbl}>Carats<//><input style=${inp} type="number" min="0" step="0.01" placeholder="1.00" value=${newStone.carats} onChange=${e=>setNewStone(p=>({...p,carats:e.target.value}))}/></div>
            <div><${Lbl}>$/ct CAD<//><input style=${inp} type="number" min="0" placeholder="800" value=${newStone.pricePerCt} onChange=${e=>setNewStone(p=>({...p,pricePerCt:e.target.value}))}/></div>
            <div><${Lbl}>Qty<//><input style=${inp} type="number" min="1" value=${newStone.qty} onChange=${e=>setNewStone(p=>({...p,qty:e.target.value}))}/></div>
            <button onClick=${addStone} className="stone-add" style=${{background:"rgba(212,175,55,0.12)",border:"1px solid rgba(212,175,55,0.35)",color:"#d4af37",borderRadius:7,padding:"9px 14px",cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap",alignSelf:"flex-end"}}>+ Add</button>
          </div>
        <//>

        <${Sec} title="Labour">
          <div style=${{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap"}}>
            ${[["hourly","Hourly"],["flat","Flat Rate"],["both","Both"]].map(([m,l]) => html`<button key=${m} onClick=${()=>setLabourMode(m)} style=${pill(labourMode===m)}>${l}</button>`)}
            <span style=${{fontSize:11,color:"#3a3020",alignSelf:"center",marginLeft:2}}>No margin on labour</span>
          </div>
          ${(labourMode==="hourly"||labourMode==="both") && html`
            <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}} className="grid-2">
              <div><${Lbl}>Hours<//><input style=${inp} type="number" min="0" step="0.5" placeholder="e.g. 6" value=${labourHours} onChange=${e=>setLabourHours(e.target.value)}/></div>
              <div><${Lbl}>Hourly Rate (CAD)<//><input style=${inp} type="number" min="0" value=${hourlyRate} onChange=${e=>setHourlyRate(e.target.value)}/></div>
            </div>
          `}
          ${(labourMode==="flat"||labourMode==="both") && html`
            <div style=${{display:"grid",gridTemplateColumns:"1fr 2fr",gap:12,marginBottom:12}} className="grid-2">
              <div><${Lbl} hint="e.g. ring sizing fee">Flat Rate ($)<//>
                <input style=${inp} type="number" min="0" placeholder="e.g. 150" value=${flatRate} onChange=${e=>setFlatRate(e.target.value)}/>
              </div>
              <div><${Lbl} hint="Appears on client quote">Description<//>
                <input style=${inp} placeholder="e.g. 14KY ring sizing up 1 size" value=${flatRateNote} onChange=${e=>setFlatRateNote(e.target.value)}/>
              </div>
            </div>
          `}
          ${wideRingSurcharge && html`
            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(251,146,60,0.08)",border:"1px solid rgba(251,146,60,0.25)",borderRadius:8,padding:"9px 12px",gap:8,flexWrap:"wrap"}}>
              <span style=${{fontSize:12,color:"#fb923c"}}>⚠ Wide ring (>3mm) surcharge flagged</span>
              <button onClick=${()=>setWideRingSurcharge(false)} style=${{background:"none",border:"none",color:"#4a3e28",cursor:"pointer",fontSize:12}}>Remove ✕</button>
            </div>
          `}
          ${labourTotal > 0 && html`<div style=${{marginTop:8,fontSize:12,color:"#6b6047"}}>Labour total: <span style=${{color:"#d4af37",fontWeight:600,fontFamily:"'Cormorant Garamond',serif",fontSize:14}}>${fmtCAD(labourTotal)}</span></div>`}
        <//>

        <${Sec} title="Additional Material Costs">
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}} className="grid-3">
            <div><${Lbl} hint="Metal margin applied">Findings / Components ($)<//>
              <input style=${inp} type="number" min="0" placeholder="0" value=${findings} onChange=${e=>setFindings(e.target.value)}/></div>
            <div><${Lbl} hint="Metal margin applied">Casting / 3D Print ($)<//>
              <input style=${inp} type="number" min="0" placeholder="0" value=${casting} onChange=${e=>setCasting(e.target.value)}/></div>
            <div><${Lbl} hint="Metal margin applied">Finishing / Polishing ($)<//>
              <input style=${inp} type="number" min="0" placeholder="0" value=${finishing} onChange=${e=>setFinishing(e.target.value)}/></div>
          </div>
        <//>

        <${Sec} title="Deposit">
          <div style=${{display:"grid",gridTemplateColumns:"1fr 3fr",gap:12,alignItems:"center"}} className="grid-2">
            <div><${Lbl}>Deposit Required %<//><input style=${inp} type="number" min="0" max="100" value=${job.deposit} onChange=${e=>set("deposit",e.target.value)}/></div>
            <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:22}}>
              <div style=${{background:"rgba(212,175,55,0.06)",border:"1px solid rgba(212,175,55,0.15)",borderRadius:8,padding:"9px 12px"}}>
                <div style=${{fontSize:9,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Deposit Amount</div>
                <div style=${{fontSize:15,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:"#d4af37"}}>${fmtCAD(depositAmount)}</div>
              </div>
              <div style=${{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"9px 12px"}}>
                <div style=${{fontSize:9,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Balance on Completion</div>
                <div style=${{fontSize:15,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:"#f5ead0"}}>${fmtCAD(balanceDue)}</div>
              </div>
            </div>
          </div>
        <//>

        <${Sec} title="Notes for Client">
          <textarea style=${{...inp,minHeight:60,resize:"vertical"}} placeholder="e.g. client-supplied stone, complimentary cleaning included…" value=${job.notes} onChange=${e=>set("notes",e.target.value)}/>
        <//>

        <div style=${{background:"linear-gradient(135deg,rgba(212,175,55,0.09) 0%,rgba(212,175,55,0.03) 100%)",border:"1px solid rgba(212,175,55,0.28)",borderRadius:14,padding:22}}>
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
            <h2 style=${{margin:0,fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700}}>Summary</h2>
            <button onClick=${()=>setShowInternal(p=>!p)} style=${{background:"none",border:"1px solid rgba(255,255,255,0.08)",color:"#4a3e28",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:11}}>
              ${showInternal?"Hide":"Show"} internal breakdown
            </button>
          </div>
          ${showInternal && html`
            <div style=${{marginBottom:18,background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"12px 16px",display:"flex",flexDirection:"column",gap:5}}>
              <div style=${{fontSize:10,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:5}}>Internal — Not Visible to Client</div>
              ${[
                ["Metal cost (VBCE)",           metalCostRaw,              ""],
                [`Metal margin (${metalMargin}%)`,metalPrice-metalCostRaw,  ""],
                ["Stone cost",                  stoneCostRaw,              ""],
                [`Stone margin (${stoneMargin}%)`,stonePrice-stoneCostRaw,  ""],
                ["Misc materials cost",         miscCostRaw,               ""],
                [`Misc margin (${metalMargin}%)`,miscPrice-miscCostRaw,     ""],
                ["Labour (no margin)",          labourTotal,               ""],
                ["─── Materials subtotal",      materialsSubtotal,         "sep"],
                ["Labour subtotal",             labourSubtotal,            ""],
                ["Pre-tax subtotal",            subtotal,                  "sep"],
                ["GST 5%",                      gst,                       ""],
                ["PST 7% (materials)",          pst,                       ""],
                ["Total margin earned",         totalMarginAmt,            "hi"],
              ].map(([l,v,flag]) => html`
                <div key=${l} style=${{display:"flex",justifyContent:"space-between",fontSize:12,color:flag==="hi"?"#34d399":flag==="sep"?"#c8b88a":"#5a4e38",borderTop:flag==="sep"?"1px solid rgba(212,175,55,0.1)":"none",paddingTop:flag==="sep"?6:0,fontWeight:flag==="hi"?700:400}}>
                  <span>${l}</span>
                  <span style=${{fontFamily:"'Cormorant Garamond',serif",fontSize:14}}>${fmtCAD(v)}</span>
                </div>
              `)}
            </div>
          `}
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:16}} className="grid-4">
            ${[{l:"Materials",v:fmtCAD(materialsSubtotal),c:"#f5ead0"},{l:"Labour",v:fmtCAD(labourSubtotal),c:"#f5ead0"},{l:"GST 5%",v:fmtCAD(gst),c:"#9ca3af"},{l:"PST 7%",v:fmtCAD(pst),c:"#9ca3af"}].map(({l,v,c}) => html`
              <div key=${l} style=${{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"9px 12px"}}>
                <div style=${{fontSize:9,color:"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>${l}</div>
                <div style=${{fontSize:14,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:c}}>${v}</div>
              </div>
            `)}
          </div>
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:18}} className="summary-3">
            ${[{l:"Total (incl. tax)",v:fmtCAD(totalWithTax),ac:true},{l:`Deposit (${depositPct}%)`,v:fmtCAD(depositAmount),ac:false},{l:"Balance on Completion",v:fmtCAD(balanceDue),ac:false}].map(({l,v,ac}) => html`
              <div key=${l} style=${{background:ac?"rgba(212,175,55,0.12)":"rgba(255,255,255,0.04)",border:`1px solid ${ac?"rgba(212,175,55,0.35)":"rgba(255,255,255,0.07)"}`,borderRadius:10,padding:"12px 14px"}}>
                <div style=${{fontSize:9,color:ac?"#a07c30":"#4a3e28",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4}}>${l}</div>
                <div style=${{fontSize:20,fontWeight:700,color:ac?"#d4af37":"#f5ead0",fontFamily:"'Cormorant Garamond',serif"}}>${v}</div>
              </div>
            `)}
          </div>
          <div style=${{display:"flex",gap:8}} className="action-btns">
            <button onClick=${exportQuote} style=${{flex:2,background:"rgba(212,175,55,0.14)",border:"1px solid rgba(212,175,55,0.4)",color:"#d4af37",borderRadius:10,padding:"13px 20px",cursor:"pointer",fontSize:14,fontWeight:600,letterSpacing:"0.04em"}}>
              Export Client Quote ↗
            </button>
            <button onClick=${newQuote} style=${{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",color:"#3a3020",borderRadius:10,padding:"13px 14px",cursor:"pointer",fontSize:13}}>
              New Quote
            </button>
          </div>
          <div style=${{marginTop:8,fontSize:10,color:"#2e2510",textAlign:"center"}}>Margins, costs & internal notes are never included in the client-facing export.</div>
        </div>

      </div>`}
    </div>
  </div>`;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>

<script>
/* ── PWA setup ─────────────────────────────────────────────────────── */
(function(){
  // iOS install hint
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) && !window.MSStream;
  const standalone = window.navigator.standalone === true;
  if(isIOS && !standalone && !localStorage.getItem('bk_ios_hint')) {
    setTimeout(()=>{
      const bar = document.createElement('div');
      bar.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#1a1508;border-top:1px solid rgba(212,175,55,0.3);padding:12px 16px 22px;font-family:DM Sans,sans-serif;font-size:12px;color:#c8b88a;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:9999;';
      bar.innerHTML='<span>Tap <strong style="color:#d4af37">Share ↑</strong> then <strong style="color:#d4af37">Add to Home Screen</strong> to install</span><button onclick="this.parentNode.remove()" style="background:none;border:1px solid rgba(212,175,55,0.3);color:#6b6047;border-radius:5px;padding:5px 10px;cursor:pointer;font-size:11px;flex-shrink:0;">✕</button>';
      document.body.appendChild(bar);
      localStorage.setItem('bk_ios_hint','1');
    }, 2500);
  }
  // Android install prompt
  let dp;
  window.addEventListener('beforeinstallprompt', e=>{
    e.preventDefault(); dp=e;
    const btn=document.createElement('button');
    btn.style.cssText='position:fixed;bottom:16px;right:16px;background:rgba(212,175,55,0.9);border:none;color:#0d0b08;border-radius:10px;padding:12px 18px;font-family:DM Sans,sans-serif;font-size:13px;font-weight:600;cursor:pointer;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.5);';
    btn.textContent='⬇ Install App';
    btn.onclick=async()=>{ btn.remove(); dp.prompt(); await dp.userChoice; dp=null; };
    document.body.appendChild(btn);
  });
})();
</script>
</body>
</html>
